<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koda Studio Artes - Leitor de Projetos 3D</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #00d2ff;
            margin-bottom: 5px;
        }
        p.subtitle {
            color: #aaaaaa;
            margin-bottom: 30px;
        }
        .upload-area {
            border: 2px dashed #00d2ff;
            padding: 40px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            display: block;
        }
        .upload-area:hover {
            background-color: #2a2a2a;
        }
        input[type="file"] {
            display: none;
        }
        button {
            background-color: #00d2ff;
            color: #121212;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            margin-top: 20px;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
        }
        button:hover {
            background-color: #009acc;
        }
        #resultado {
            margin-top: 30px;
            text-align: left;
            background-color: #2a2a2a;
            padding: 15px;
            border-radius: 6px;
            display: none;
        }
        .loader {
            display: none;
            margin-top: 20px;
            color: #00d2ff;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Koda Studio Artes</h1>
        <p class="subtitle">Conversor de Rascunho para Projeto</p>

        <label class="upload-area" id="drop-area">
            <span id="file-name">Clique para enviar o rascunho (Papel/Caneta)</span>
            <input type="file" id="imageInput" accept="image/*">
        </label>

        <button onclick="processarImagem()">Gerar Medidas e Projeto</button>

        <div class="loader" id="loader">Lendo o rascunho com IA... A mágica está acontecendo...</div>

        <div id="resultado">
            <h3 style="color: #00d2ff;">Leitura do Projeto:</h3>
            <pre id="texto-extraido" style="white-space: pre-wrap; font-family: inherit;"></pre>
        </div>
    </div>

    <script>
        // Insira a sua chave de API real aqui, mantendo-a entre as aspas
        const API_KEY = "AQ.Ab8RN6KG9Zw970Nd3RIicnlEmMduiJ1Jmq2jTu-bCSaftAjWDA"; 

        const imageInput = document.getElementById('imageInput');
        const fileNameDisplay = document.getElementById('file-name');

        imageInput.addEventListener('change', function() {
            if (this.files && this.files[0]) {
                fileNameDisplay.textContent = "Arquivo selecionado: " + this.files[0].name;
            }
        });

        async function processarImagem() {
            const file = imageInput.files[0];
            if (!file) {
                alert('Por favor, envie a foto do rascunho primeiro!');
                return;
            }

            document.getElementById('loader').style.display = 'block';
            document.getElementById('resultado').style.display = 'none';

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async function () {
                const base64Image = reader.result.split(',')[1];

                const promptText = "Aja como um arquiteto profissional. Analise este esboço feito à mão. Liste todos os cômodos, portas, janelas e extraia as metragens (medidas) exatas escritas no papel. Organize a resposta de forma limpa e profissional.";

                try {
                    // Construindo a URL com a API Key, que é o padrão da API do Gemini
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: promptText },
                                    { inline_data: { mime_type: file.type, data: base64Image } }
                                ]
                            }]
                        })
                    });

                    const data = await response.json();
                    
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('resultado').style.display = 'block';
                    
                    if (data.error) {
                        document.getElementById('texto-extraido').innerText = `Erro do Google: ${data.error.message}`;
                        return;
                    }
                    
                    const textoResultado = data.candidates[0].content.parts[0].text;
                    document.getElementById('texto-extraido').innerText = textoResultado;

                } catch (error) {
                    console.error('Erro:', error);
                    document.getElementById('loader').style.display = 'none';
                    alert('Erro de comunicação com o servidor.');
                }
            };
        }
    </script>
</body>
</html>
